# fleetwatch landing — HTTP-only vhost (used BEFORE the first Let's Encrypt
# cert exists). `deploy/update.sh` picks this template when no cert is found
# at /etc/letsencrypt/live/fleetwatch.ohmaseclaro.dev/, and swaps to the
# full HTTPS template (fleetwatch-landing-host.conf) after `finalize-tls.sh`
# has issued the cert.
#
# Placeholder __FLEETWATCH_REPO_ROOT__ is replaced by deploy/update.sh.

server {
    listen 80;
    listen [::]:80;
    server_name fleetwatch.ohmaseclaro.dev fleetwatch.ohmaseclaro.com;

    # Reserve the ACME challenge path so certbot can issue/renew without
    # us bouncing the vhost mid-flight.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    real_ip_header CF-Connecting-IP;

    access_log /var/log/nginx/fleetwatch-landing.access.log;
    error_log  /var/log/nginx/fleetwatch-landing.error.log;

    root __FLEETWATCH_REPO_ROOT__/deploy/landing;
    index index.html;

    location = /index.html {
        add_header Cache-Control "public, max-age=300";
    }

    location /img/ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
