# fleetwatch landing — static marketing site.
#
# Two hostnames, one canonical:
#   • fleetwatch.ohmaseclaro.dev   ← canonical (serves content)
#   • fleetwatch.ohmaseclaro.com   ← 301 redirects to .dev
#
# Cloudflare in front, SSL mode "Full" (or "Full (strict)"). Origin must
# serve TLS on :443. One Let's Encrypt cert covers both hostnames:
#
#   certbot certonly --nginx \
#     -d fleetwatch.ohmaseclaro.dev \
#     -d fleetwatch.ohmaseclaro.com
#
# Placeholder __FLEETWATCH_REPO_ROOT__ is replaced by deploy/update.sh.

# ─── :80 → ACME challenge + redirect to HTTPS ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fleetwatch.ohmaseclaro.dev fleetwatch.ohmaseclaro.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── :443 .com → 301 to .dev (canonical) ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleetwatch.ohmaseclaro.com;

    ssl_certificate     /etc/letsencrypt/live/fleetwatch.ohmaseclaro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetwatch.ohmaseclaro.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fleetwatch.ohmaseclaro.dev$request_uri;
}

# ─── :443 .dev → serve the landing ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleetwatch.ohmaseclaro.dev;

    ssl_certificate     /etc/letsencrypt/live/fleetwatch.ohmaseclaro.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetwatch.ohmaseclaro.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/fleetwatch-landing.access.log;
    error_log  /var/log/nginx/fleetwatch-landing.error.log;

    # Pull the real client IP from Cloudflare so logs / rate limits make sense.
    real_ip_header CF-Connecting-IP;

    root __FLEETWATCH_REPO_ROOT__/deploy/landing;
    index index.html;

    # Short cache on the HTML so deploys propagate quickly.
    location = /index.html {
        add_header Cache-Control "public, max-age=300";
    }

    # Long cache on immutable assets — file paths are versioned by content
    # (rename hero-1600-v2.jpg etc. when you change them).
    location /img/ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Real 404 for missing files (NOT a falback to index.html — this isn't an
    # SPA, and OG/Twitter scrapers should get a 404 instead of HTML when they
    # request a missing asset).
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers — modest but sensible defaults for a static site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
